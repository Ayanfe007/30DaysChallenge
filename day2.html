<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | GB Wear</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .login-container {
            display: flex;
            width: 880px;
            min-height: 550px;
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1), 0 5px 15px rgba(0, 0, 0, 0.05);
        }

        /* Left panel (form) */
        .form-panel {
            flex: 1;
            padding: 40px 36px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            background: white;
        }

        .brand-logo {
            font-size: 24px;
            font-weight: 700;
            color: #0f2a4a;
            margin-bottom: 6px;
        }
        .brand-logo span {
            color: #fbbf24;
        }

        .form-panel h2 {
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 4px;
            color: #0f2a4a;
        }

        .subtitle {
            color: #64748b;
            font-size: 14px;
            margin-bottom: 28px;
        }

        .input-group {
            margin-bottom: 18px;
        }
        .input-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #0f2a4a;
            margin-bottom: 6px;
        }
        .input-group input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            font-size: 14px;
            transition: border 0.2s, box-shadow 0.2s;
            outline: none;
            background: #f8fafc;
        }
        .input-group input:focus {
            border-color: #fbbf24;
            box-shadow: 0 0 0 3px rgba(251, 191, 36, 0.2);
            background: white;
        }
        .input-group input::placeholder {
            color: #94a3b8;
            font-size: 13px;
        }

        .forgot-row {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 22px;
        }
        .forgot-link {
            font-size: 13px;
            color: #0f2a4a;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }
        .forgot-link:hover {
            color: #fbbf24;
        }

        .login-btn {
            width: 100%;
            padding: 13px;
            background: #fbbf24;
            color: #0f2a4a;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            margin-bottom: 20px;
        }
        .login-btn:hover {
            background: #f59e0b;
        }
        .login-btn:active {
            transform: scale(0.98);
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            color: #94a3b8;
            font-size: 13px;
            margin-bottom: 20px;
        }
        .divider::before,
        .divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background: #e2e8f0;
        }

        .social-buttons {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 28px;
        }
        .social-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 11px;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            background: white;
            font-size: 14px;
            font-weight: 500;
            color: #0f2a4a;
            cursor: pointer;
            transition: background 0.2s, border-color 0.2s;
            text-decoration: none;
        }
        .social-btn:hover {
            background: #f8fafc;
            border-color: #fbbf24;
        }
        .social-btn svg {
            width: 20px;
            height: 20px;
        }

        .signup-prompt {
            text-align: center;
            font-size: 14px;
            color: #64748b;
        }
        .signup-prompt a {
            color: #fbbf24;
            font-weight: 600;
            text-decoration: none;
            transition: color 0.2s;
        }
        .signup-prompt a:hover {
            color: #0f2a4a;
        }

        /* Right panel (promo) */
        .promo-panel {
            flex: 1.1;
            background: #0f2a4a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 30px;
            color: white;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .promo-panel::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 70%, rgba(251, 191, 36, 0.15) 0%, transparent 60%);
            top: 0;
            left: 0;
        }
        .promo-content {
            position: relative;
            z-index: 1;
        }
        .promo-content h2 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 16px;
            color: #fbbf24;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }
        .promo-content p {
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 30px;
            max-width: 280px;
            color: #cbd5e1;
        }
        .promo-image {
            width: 200px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
            margin-bottom: 30px;
            border: 2px solid rgba(251, 191, 36, 0.4);
        }
        .signup-btn {
            background: #fbbf24;
            color: #0f2a4a;
            padding: 12px 28px;
            border-radius: 30px;
            font-weight: 700;
            font-size: 15px;
            text-decoration: none;
            display: inline-block;
            transition: background 0.2s, transform 0.1s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .signup-btn:hover {
            background: #f59e0b;
            transform: translateY(-2px);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .login-container {
                flex-direction: column;
                width: 100%;
                border-radius: 12px;
            }
            .promo-panel {
                order: -1;
                padding: 30px 20px;
            }
            .promo-content h2 {
                font-size: 22px;
            }
            .promo-image {
                width: 150px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <!-- LEFT: LOGIN FORM -->
        <div class="form-panel">
            <div class="brand-logo">GB <span>Wear</span></div>
            <h2>Welcome back</h2>
            <p class="subtitle">Sign in to your account to continue</p>

            <form action="#" method="post">
                <div class="input-group">
                    <label for="email">Email address</label>
                    <input type="email" id="email" placeholder="you@example.com" required>
                </div>

                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>

                <div class="forgot-row">
                    <a href="#" class="forgot-link">Forgot password?</a>
                </div>

                <button type="submit" class="login-btn">Sign In</button>
            </form>

            <div class="divider">or continue with</div>

            <div class="social-buttons">
                <!-- Google button with inline SVG -->
                <a href="#" class="social-btn">
                    <svg viewBox="0 0 24 24" width="20" height="20">
                        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
                        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                    </svg>
                    Google
                </a>

                <!-- Facebook button with inline SVG -->
                <a href="#" class="social-btn">
                    <svg viewBox="0 0 24 24" width="20" height="20">
                        <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z" fill="#1877F2"/>
                    </svg>
                    Facebook
                </a>
            </div>

            <p class="signup-prompt">
                Don't have an account? <a href="#">Create one</a>
            </p>
        </div>

        <!-- RIGHT: PROMO PANEL -->
        <div class="promo-panel">
            <div class="promo-content">
                <h2>Discover premium comfort</h2>
                <p>The world's leading underwear brand. Feel the difference with every wear.</p>
                <img src="download (3).jpg" alt="GB Wear Collection" class="promo-image">
                <br>
                <a href="#" class="signup-btn">Create Account</a>
            </div>
        </div>
    </div>
</body>
</html>
