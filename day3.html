<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Day 3: E-commerce Product Card</title>
  <style>
    body {
      font-family: Arial, Helvetica, sans-serif; /* Cleaner font for modern stores */
      background-color: #f4f4f9; /* Soft background so the card pops */
      display: flex;
      justify-content: center; /* Centers the card on the screen */
      padding-top: 50px;
    }

    .container {
      background-color: rgb(8, 1, 1);
      width: 280px; /* Made it slightly wider to fit everything nicely */
      border-radius: 20px; /* Softened the corners */
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
      /* A softer, more realistic drop shadow */
      box-shadow: 0px 10px 20px rgba(0, 0, 0, 0.15); 
      
      /* THIS IS NEW: Tells the browser to animate changes smoothly */
      transition: transform 0.3s ease, box-shadow 0.3s ease; 
    }

    /* THIS IS NEW: The hover state for the whole card */
    .container:hover {
      transform: translateY(-10px); /* Lifts the card up 10 pixels */
      box-shadow: 0px 20px 30px rgba(0, 0, 0, 0.25); /* Makes shadow bigger when lifted */
    }

    .img-container {
      width: 100%;
      height: 250px;
      background-color: white; /* Keeps image background clean */
    }

    img {
      height: 100%;
      width: 100%;
      /* THIS IS NEW: Stops the image from stretching! */
      object-fit: cover; 
      display: block;
    }

    .sale {
      position: absolute;
      background-color: #236af0; /* Matched your brand blue from Day 2 */
      color: white;
      padding: 5px 15px;
      border-radius: 20px;
      border: none;
      font-weight: bold;
      top: 15px;
      left: 15px;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .text {
      color: white;
      padding: 20px; /* Gives the text room to breathe inside the black box */
      display: flex;
      flex-direction: column;
      align-items: center; /* Centers all text and buttons */
      text-align: center;
    }

    .brand {
      margin: 0;
      font-size: 12px;
      color: #aaa; /* Gray text for the brand name */
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    h3 {
      margin: 10px 0;
      font-size: 18px;
    }

    /* THIS IS NEW: Pricing layout */
    .pricing {
      margin-bottom: 20px;
      font-size: 16px;
    }

    .old-price {
      color: #888;
      text-decoration: line-through; /* Puts a line through the old price */
      margin-right: 10px;
    }

    .new-price {
      color: #236af0; /* Brand blue for the sale price */
      font-weight: bold;
      font-size: 20px;
    }

    .add {
      height: 40px;
      width: 100%; /* Makes button fill the width of the text box */
      border-radius: 8px;
      background-color: #236af0;
      color: white;
      border: none;
      font-weight: bold;
      cursor: pointer; /* Turns mouse into a clicking hand */
      transition: background-color 0.3s ease; /* Smooth color change */
    }

    /* THIS IS NEW: Button hover effect */
    .add:hover {
      background-color: #1a4eb8; /* Slightly darker blue when hovered */
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="img-container">
       <button class="sale">Sale</button>
       <img src="boxers.jpg" alt="Premium Comfort Trunks">
    </div>
    
    <div class="text">
      <p class="brand">Gb Wears</p>
      <h3>Premium Comfort Trunks</h3> <div class="pricing">
          <span class="old-price">$30.00</span>
          <span class="new-price">$22.00</span>
      </div>

      <button class="add">ADD TO CART</button>
    </div>
  </div>
</body>
</html>
